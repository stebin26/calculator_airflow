name: CI

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
      - name: Install Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install pytest pylint

      - name: Run pylint
        run: pylint app/calculator.py

      - name: Build Docker Image
        run: docker build -t calculator-app .

      - name: Run Container
        run: docker run -d calculator-app

      - name: Run tests
        run: PYTHONPATH=$PWD pytest -m tests/